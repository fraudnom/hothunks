<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Male Model Portfolio</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=Inter:wght@400;500;600;700&display=swap');

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  font-family:'Inter',sans-serif;
  background:linear-gradient(135deg,#edf4ff,#f8fbff);
  color:#18202a;
  min-height:100vh;
}

header{
  text-align:center;
  padding:50px 20px 18px;
}

header h1{
  font-family:'DM Serif Display',serif;
  font-size:3rem;
  color:#172133;
}

header p{
  margin-top:8px;
  color:#5f6f86;
}

/* Tabs */

.tabs{
  display:flex;
  justify-content:center;
  gap:14px;
  margin:24px 0;
}

.tab-btn{
  border:none;
  background:#fff;
  color:#4d5f77;
  padding:12px 24px;
  border-radius:40px;
  font-weight:600;
  cursor:pointer;
  box-shadow:0 6px 18px rgba(0,0,0,.06);
  transition:.25s;
}

.tab-btn.active{
  background:#2f6fed;
  color:#fff;
}

/* Search */

.search-box{
  display:flex;
  justify-content:center;
  margin:10px 20px 28px;
}

.search-box input{
  width:min(420px,92%);
  padding:14px 18px;
  border:none;
  border-radius:16px;
  outline:none;
  font-size:1rem;
  background:#fff;
  color:#18202a;
  box-shadow:0 8px 20px rgba(33,72,126,.08);
}

.search-box input::placeholder{
  color:#8a98ab;
}

/* Grid */

.container{
  max-width:1350px;
  margin:auto;
  padding:24px;
}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(230px,1fr));
  gap:28px;
}

/* Cards */

.card{
  background:#fff;
  border-radius:24px;
  overflow:hidden;
  cursor:pointer;
  transition:.25s;
  box-shadow:0 10px 24px rgba(33,72,126,.08);
}

.card:hover{
  transform:translateY(-6px);
  box-shadow:0 18px 34px rgba(33,72,126,.14);
}

.card img{
  width:100%;
  aspect-ratio:3/5;
  object-fit:cover;
}

.card-content{
  padding:16px;
  text-align:center;
}

.card h3{
  font-size:1.05rem;
  font-weight:700;
  color:#18202a;
}

/* Modal */

.modal{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.55);
  display:none;
  justify-content:center;
  align-items:center;
}

.modal-content{
  background:#fff;
  width:min(350px,92%);
  border-radius:24px;
  overflow:hidden;
  box-shadow:0 24px 50px rgba(0,0,0,.18);
}

.modal img{
  width:100%;
  aspect-ratio:3/5;
  object-fit:cover;
}

.modal-body{
  padding:18px;
  text-align:center;
}

.modal-body h2{
  font-family:'DM Serif Display',serif;
  font-size:1.9rem;
}

.close{
  position:absolute;
  top:18px;
  right:24px;
  font-size:30px;
  color:#fff;
  cursor:pointer;
}
</style>
</head>
<body>

<header>
  <h1>Men of Screen</h1>
  <p>Television & Movie Portfolio Showcase</p>
</header>

<!-- Tabs -->
<div class="tabs">
  <button class="tab-btn active" onclick="showTab('tv',this)">
    Television
  </button>

  <button class="tab-btn" onclick="showTab('bollywood',this)">
    Bollywood
  </button>
</div>

<!-- Search -->
<div class="search-box">
  <input
    type="text"
    id="searchInput"
    placeholder="Search actors..."
    onkeyup="searchActors()"
  />
</div>

<div class="container">

  <div id="tv" class="grid"></div>

  <div
    id="bollywood"
    class="grid"
    style="display:none;"
  ></div>

</div>

<!-- Modal -->

<div class="modal" id="modal">
  <span class="close" onclick="closeModal()">&times;</span>

  <div class="modal-content">
    <img id="modalImg" src="">

    <div class="modal-body">
      <h2 id="modalTitle"></h2>
    </div>
  </div>
</div>

<script>

const tvActors=[
{name:"Arjun Bijlani",img:"arjun.avif"},
{name:"Akshay Bindra",img:"akshay.jpg"},
{name:"Savi Thakur",img:"savi.jpg"},
{name:"Simba Nagpal",img:"simba.jpg"},
{name:"Gautam Rode",img:"gautam.jpg"},
{name:"Parth Samthaan",img:"parth.jpg"},
{name:"Pratik Sehajpal",img:"pratik.jpg"},
{name:"Namik Paul",img:"namik.jpg"},
{name:"Adhvik Mahajan",img:"adhvik.jpg"},
{name:"Rohan Mehra",img:"rohan.jpg"},
{name:"Arjit Taneja",img:"arjit.jpg"},
{name:"Karan Wahi",img:"karan.jpg"},
{name:"Kunal Singh",img:"kunal.jpg"},
{name:"Vijayendra Kumeria",img:"vijayendra.jpeg"},
{name:"Mohit Malik",img:"mohit.jpg"},
{name:"Karan Tacker",img:"karant.jpg"},
{name:"Vishal Singh",img:"vishal.jpg"},
{name:"Vivek Dahiya",img:"vivek.jpg"}
];

const movieActors=[
{name:"Ranbir Kapoor",img:"ranbir.jpeg"},
{name:"Ranveer Singh",img:"ranveer.jpeg"},
{name:"Sunny Kaushal",img:"sunny.jpeg"},
{name:"Sidharth Malhotra",img:"sidharth.jpg"},
{name:"Lakshya",img:"lakshya.jpg"},
{name:"Varun Dhawan",img:"varun.jpg"},
{name:"Kartik Aaryan",img:"kartik.jpeg"},
{name:"Tiger Shroff",img:"tiger.jpeg"}
];

function createCards(data,id){
  const box=document.getElementById(id);

  box.innerHTML=data.map(actor=>`
    <div class="card"
      onclick="openModal('${actor.name}','${actor.img}')">

      <img src="${actor.img}" alt="${actor.name}">

      <div class="card-content">
        <h3>${actor.name}</h3>
      </div>

    </div>
  `).join('');
}

createCards(tvActors,"tv");
createCards(movieActors,"bollywood");

function showTab(tabId,btn){

  document.getElementById("tv").style.display="none";
  document.getElementById("bollywood").style.display="none";

  document.getElementById(tabId).style.display="grid";

  document
    .querySelectorAll(".tab-btn")
    .forEach(tab=>{
      tab.classList.remove("active");
    });

  btn.classList.add("active");

  document.getElementById("searchInput").value="";
  searchActors();
}

function openModal(name,img){
  document.getElementById("modal").style.display="flex";
  document.getElementById("modalImg").src=img;
  document.getElementById("modalTitle").innerText=name;
}

function closeModal(){
  document.getElementById("modal").style.display="none";
}

window.onclick=function(e){
  if(e.target.id==="modal"){
    closeModal();
  }
}

function searchActors(){

  const value=
    document.getElementById("searchInput")
      .value
      .toLowerCase();

  const activeGrid=
    document.getElementById("tv").style.display==="grid"
      ? document.getElementById("tv")
      : document.getElementById("bollywood");

  activeGrid
    .querySelectorAll(".card")
    .forEach(card=>{

      const name=
        card.querySelector("h3")
          .innerText
          .toLowerCase();

      card.style.display=
        name.includes(value)
          ? "block"
          : "none";
    });
}

</script>
</body>
</html>
